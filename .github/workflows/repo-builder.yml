name: 🏗️ Repo Builder
on: { schedule: [{ cron: '0 9 * * 1' }], workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/repo-builder/scripts/repo-builder.sh
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
