name: 🔗 Bot Brain
on:
  schedule: [{ cron: '0 */2 * * *' }]
  workflow_dispatch:
permissions: { contents: write, issues: write }
jobs:
  brain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/bot-brain/scripts/bot-brain.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: bot-brain-report, path: bot-brain-report.md }
      - name: 💾 Sync state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/bot-state.json creations/ 2>/dev/null
          git diff --cached --quiet || git commit -m "🔗 Bot Brain: Updated state [skip ci]"
          git push || true
