name: 📊 Weekly Reporter
on:
  schedule: [{ cron: '0 17 * * 5' }]
  workflow_dispatch:
permissions: { contents: read, issues: write }
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 📊 Run
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
        run: |
          source shared/utils.sh
          bash bots/weekly-reporter/scripts/weekly-reporter.sh
      - name: 📋 Issue
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        run: |
          gh label create "documentation" --force 2>/dev/null || true
          gh label create "automated" --force 2>/dev/null || true
          gh issue create --title "📊 Weekly Report — $(date +%Y-%m-%d)" --body "$(cat weekly-reporter-report.md)" --label "documentation,automated" || echo "Issue creation skipped"
