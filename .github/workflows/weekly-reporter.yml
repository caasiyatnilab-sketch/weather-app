name: 📊 Weekly Reporter
on:
  schedule: [{ cron: '0 17 * * 5' }]
  workflow_dispatch:
permissions: { contents: read, issues: write }
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 📊 Run
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
        run: |
          source shared/utils.sh
          bash bots/weekly-reporter/scripts/weekly-reporter.sh
      - name: 📋 Issue
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        run: |
          TITLE="📊 Weekly Report — $(date +%Y-%m-%d)"
          BODY=$(cat weekly-reporter-report.md)
          # Skip if issue already exists today
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" -eq 0 ]; then
            gh issue create --title "$TITLE" --body "$BODY" || echo "Issue created with warnings"
          else
            echo "Weekly report already exists for today"
          fi
