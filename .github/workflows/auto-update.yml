name: 📦 Auto Update

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8AM UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update all dependencies'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Check for Updates
        id: updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FORCE: ${{ inputs.force }}
        run: |
          chmod +x scripts/auto-update.sh
          bash scripts/auto-update.sh

      - name: 📊 Upload Update Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report-${{ github.run_number }}
          path: update-report.md
          retention-days: 30

  dependabot-config:
    name: 🤖 Dependabot Config Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📋 Check Dependabot Config
        run: |
          if [ ! -f ".github/dependabot.yml" ]; then
            echo "⚠️ No dependabot.yml found. Creating one..."
            mkdir -p .github
            cat > .github/dependabot.yml << 'EOF'
          version: 2
          updates:
            - package-ecosystem: "npm"
              directory: "/"
              schedule:
                interval: "weekly"
                day: "monday"
              open-pull-requests-limit: 10
              labels:
                - "dependencies"
                - "automated"
              reviewers:
                - "${{ github.repository_owner }}"
              commit-message:
                prefix: "deps"
                prefix-development: "deps-dev"

            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
              labels:
                - "dependencies"
                - "ci"
          EOF
            echo "✅ Created .github/dependabot.yml"
          else
            echo "✅ Dependabot config exists"
          fi
