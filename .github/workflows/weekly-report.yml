name: 📊 Weekly Report

on:
  schedule:
    - cron: '0 17 * * 5'  # Friday 5PM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📊 Generate Weekly Report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/weekly-report.sh
          bash scripts/weekly-report.sh

      - name: 📋 Create Report Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "📊 Weekly Report — $(date +%Y-%m-%d)" \
            --body "$(cat weekly-report.md)" \
            --label "documentation,automated"

      - name: 📊 Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: weekly-report.md
          retention-days: 90

      - name: 📢 Send to Webhook (Optional)
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          SUMMARY=$(head -50 weekly-report.md)
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"📊 **Weekly Report Generated**\n\`\`\`\n${SUMMARY}\n\`\`\`\"}" \
            "$DISCORD_WEBHOOK" || true
