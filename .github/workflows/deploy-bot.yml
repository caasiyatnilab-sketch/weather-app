name: 🚀 Deploy Bot
on: { push: { branches: [main, master] }, workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/deploy-bot/scripts/deploy-bot.sh
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
