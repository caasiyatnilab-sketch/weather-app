name: 📬 Notification Bot
on:
  schedule:
    - cron: '0 8,12,18 * * *'  # 8AM, 12PM, 6PM UTC
  workflow_dispatch:
  workflow_run:
    workflows: ["🔍 Health Checker", "🔒 Security Scanner"]
    types: [completed]
permissions:
  contents: read
  issues: write
  actions: read
jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - name: 📬 Run Notifications
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          source shared/utils.sh
          chmod +x bots/notification-bot/scripts/notification-bot.sh
          bash bots/notification-bot/scripts/notification-bot.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notification-report
          path: notification-report.md
