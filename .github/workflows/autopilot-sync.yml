name: 🤖 Autopilot Sync
on:
  schedule: [{ cron: "0 */6 * * *" }]
  workflow_dispatch: {}
permissions: { contents: read, issues: write, actions: read }
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clone bot repo
        uses: actions/checkout@v4
        with: { repository: caasiyatnilab-sketch/github-autopilot, path: autopilot, token: "${{ secrets.GITHUB_TOKEN }}" }
      - name: 🤖 Run bots
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", REPO: "${{ github.repository }}" }
        run: |
          cd autopilot
          source shared/utils.sh
          for bot in bots/*/scripts/*.sh; do
            echo "Running $(basename $bot)..."
            bash "$bot" 2>/dev/null || true
          done
      - name: 📊 Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: bot-reports, path: autopilot/*-report.md }
