# .github/repo-bot.yml — RepoBot Configuration
# Place this file in your repo root to customize behavior

health_check:
  enabled: true
  notify_on_failure: true
  schedule: "0 6 * * *"  # Daily at 6AM UTC

security:
  enabled: true
  severity_threshold: "high"  # low, medium, high, critical
  auto_create_issues: true
  secret_detection: true

auto_update:
  enabled: true
  auto_merge_patch: true
  auto_merge_minor: false
  labels: ["dependencies", "automated"]

issue_manager:
  enabled: true
  stale_days: 30
  stale_label: "stale"
  exempt_labels: ["pinned", "security", "high-priority", "keep-open"]
  welcome_message: true
  auto_label: true

auto_fix:
  enabled: true
  lint: true
  format: true
  dependabot_auto_resolve: true
  whitespace_cleanup: true

report:
  enabled: true
  schedule: "0 17 * * 5"  # Friday 5PM UTC
  channel: ""  # Discord/Slack webhook URL (optional)
