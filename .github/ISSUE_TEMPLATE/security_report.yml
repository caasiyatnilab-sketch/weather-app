name: 🔒 Security Report
description: Report a security vulnerability
title: "[Security]: "
labels: ["security", "high-priority"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Please do NOT report security vulnerabilities publicly.**
        If this is a critical security issue, please email the maintainer directly instead.

  - type: textarea
    id: vulnerability
    attributes:
      label: Vulnerability Description
      description: Describe the security issue.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low — Minor information disclosure
        - Medium — Limited access or impact
        - High — Significant access or data exposure
        - Critical — Full system compromise
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can this be exploited?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: What is the potential impact?
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested Fix
      description: If you have suggestions for fixing this.
    validations:
      required: false
