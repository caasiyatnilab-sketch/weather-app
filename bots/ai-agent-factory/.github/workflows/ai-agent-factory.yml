name: 🧠 AI Agent Factory
on: { schedule: [{ cron: '0 10 * * 1' }], workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/ai-agent-factory/scripts/ai-agent-factory.sh
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
