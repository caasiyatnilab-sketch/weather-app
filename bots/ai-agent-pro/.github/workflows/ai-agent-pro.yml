name: 🧠 AI Agent Pro
on:
  schedule: [{ cron: '0 10 * * 1' }]
  workflow_dispatch:
permissions: { contents: write }
jobs:
  factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/ai-agent-pro/scripts/ai-agent-pro.sh
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: ai-agent-pro-report, path: ai-agent-pro-report.md }
