name: 🚀 Mega Deploy
on:
  push: { branches: [main, master] }
  workflow_dispatch:
permissions: { contents: write }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/mega-deploy/scripts/mega-deploy.sh
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: mega-deploy-report, path: mega-deploy-report.md }
